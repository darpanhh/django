{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogSpace — Share Your Story</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #574fd6;
            --accent: #a78bfa;
            --bg-dark: #0f0f1a;
            --bg-card: rgba(255,255,255,0.05);
            --bg-card-hover: rgba(255,255,255,0.09);
            --text-primary: #f0f0ff;
            --text-secondary: #a0a0c0;
            --border: rgba(255,255,255,0.1);
            --glass-bg: rgba(15,15,30,0.7);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --gradient: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        body {
            background:
                radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.1) 0%, transparent 55%),
                #0f0f1a;
            background-attachment: fixed;
        }

        /* === NAVBAR === */
        .blog-navbar {
            background: rgba(15,15,26,0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .blog-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .blog-brand:hover { opacity: 0.85; }

        .navbar-toggler {
            border: 1px solid var(--border) !important;
            padding: 0.3rem 0.6rem;
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        .nav-profile-btn {
            background: var(--gradient);
            border: none;
            color: #fff !important;
            border-radius: 50px;
            padding: 0.45rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-profile-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108,99,255,0.5);
        }

        .dropdown-menu {
            background: rgba(20,20,40,0.95) !important;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            box-shadow: var(--shadow) !important;
            padding: 0.5rem;
            min-width: 180px;
        }

        .dropdown-item {
            color: var(--text-primary) !important;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: var(--bg-card-hover) !important;
            color: var(--accent) !important;
        }

        /* === CARDS === */
        .blog-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            animation: fadeUp 0.5s ease both;
        }

        .blog-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(108,99,255,0.4);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(108,99,255,0.2);
        }

        /* === AVATAR === */
        .author-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            flex-shrink: 0;
        }

        .author-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.82rem;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0.8rem 0 0.5rem;
            line-height: 1.4;
        }

        .post-content {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .divider {
            border-color: var(--border);
            margin: 0.8rem 0;
        }

        /* === BUTTONS === */
        .btn-primary-grad {
            background: var(--gradient);
            border: none;
            color: #fff;
            border-radius: 50px;
            padding: 0.55rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary-grad:hover {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,99,255,0.4);
        }

        .btn-outline-grad {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--accent);
            border-radius: 50px;
            padding: 0.5rem 1.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-outline-grad:hover {
            background: var(--gradient);
            color: #fff;
            transform: translateY(-2px);
        }

        /* === FORM INPUTS === */
        .blog-input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-primary) !important;
            border-radius: 10px !important;
            padding: 0.75rem 1rem !important;
            transition: all 0.2s ease;
        }

        .blog-input::placeholder { color: var(--text-secondary) !important; }

        .blog-input:focus {
            background: rgba(108,99,255,0.08) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.2) !important;
            outline: none;
        }

        .input-group-text {
            background: rgba(255,255,255,0.06) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            border-radius: 10px 0 0 10px !important;
        }

        .blog-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: block;
        }

        /* === AUTH PAGES === */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            background: rgba(20,20,40,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.4s ease;
        }

        .auth-logo {
            width: 72px;
            height: 72px;
            background: var(--gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.2rem;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .auth-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-link:hover { color: var(--primary); }

        /* === HERO === */
        .hero-section {
            text-align: center;
            padding: 5rem 1rem 3rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 50px;
            padding: 0.4rem 1rem;
            font-size: 0.82rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 520px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }

        /* === SECTION HEADER === */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        /* === BADGE === */
        .post-badge {
            background: rgba(108,99,255,0.2);
            border: 1px solid rgba(108,99,255,0.35);
            color: var(--accent);
            border-radius: 50px;
            padding: 0.25rem 0.85rem;
            font-size: 0.82rem;
            font-weight: 600;
        }

        /* === ANIMATIONS === */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animated { animation: fadeUp 0.5s ease both; }
        .animated-delay-1 { animation-delay: 0.1s; }
        .animated-delay-2 { animation-delay: 0.2s; }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* === RESPONSIVE === */
        @media (max-width: 576px) {
            .auth-card { padding: 2rem 1.5rem; }
            .blog-card { padding: 1.2rem; }
            .hero-section { padding: 3rem 1rem 2rem; }
        }
    </style>
</head>
<body>
    {% block full_page %}
    <div class="container" style="max-width:1100px; padding: 0 1.5rem;">
        {% block content %}
        {% endblock %}
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
