{% extends 'blog/base.html' %}
{% load static %}

{% block full_page %}
<div class="auth-wrapper">
    <div class="auth-card">
        <form method="post">
            {% csrf_token %}

            <!-- LOGO -->
            <div class="auth-logo">✍️</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue to BlogSpace</p>

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="blog-label" for="username">
                    <i class="fa-solid fa-user me-1"></i> Username
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fa-solid fa-user fa-sm"></i>
                    </span>
                    <input type="text" class="form-control blog-input" id="username" name="uname"
                        placeholder="Enter your username" style="border-radius:0 10px 10px 0 !important;">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">
                <label class="blog-label" for="password">
                    <i class="fa-solid fa-lock me-1"></i> Password
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fa-solid fa-lock fa-sm"></i>
                    </span>
                    <input type="password" class="form-control blog-input" id="password" name="upassword"
                        placeholder="Enter your password" style="border-radius:0 10px 10px 0 !important;">
                </div>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="btn-primary-grad w-100 justify-content-center mb-4"
                style="padding:0.75rem; font-size:1rem; border-radius:12px;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>

            <!-- REGISTER LINK -->
            <p class="text-center mb-0" style="color:var(--text-secondary); font-size:0.88rem;">
                Don't have an account?
                <a href="/" class="auth-link">Create one</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
